# ============================================================================
# Sampler simulation config
# - Used by: python main.py sim --config config/config_sampler_sim.yaml
# - Scope: sampler simulation only (no qa section in this file)
# - Profile: short smoke run for sampler integration checks
# ============================================================================

# === Subject Form ===========================================================
subinfo_fields:
  - name: subject_id
    type: int
    constraints:
      min: 101
      max: 999
      digits: 3

subinfo_mapping:
  subject_id: Subject ID (3 digits)
  Participant Information: Participant Information
  registration_failed: Registration failed
  registration_successful: Registration successful
  invalid_input: "Invalid input for {field}"


# === Display / Window =======================================================
window:
  size: [1024, 768]
  units: pix
  screen: 0
  bg_color: gray
  fullscreen: false
  monitor_width_cm: 35.5
  monitor_distance_cm: 60


# === Task ==================================================================
task:
  task_name: "{{cookiecutter.project_name}}"
  save_path: ./outputs/sim
  total_blocks: 1
  total_trials: 8
  trial_per_block: 8
  conditions: [baseline, variant]
  key_list: [space]
  correct_key: space
  seed_mode: same_across_sub
  delta: 1


# === Timing =================================================================
timing:
  fixation_duration: 0.5
  response_window_duration: 1.2
  feedback_duration: 0.4
  iti_duration: 0.6


# === Stimuli ================================================================
stimuli:
  fixation:
    type: text
    text: "+"
    color: white
    height: 48

  instruction_text:
    type: text
    text: "Respond with SPACE when the trial prompt appears."
    color: white
    height: 28
    wrapWidth: 900

  trial_prompt:
    type: text
    text: "Condition: {condition_label}\\nPress SPACE."
    color: white
    height: 36
    wrapWidth: 900

  feedback_hit:
    type: text
    text: "Response recorded"
    color: green
    height: 32

  feedback_miss:
    type: text
    text: "No response"
    color: orange
    height: 32

  block_break:
    type: text
    text: "Block {block_num}/{total_blocks}\\nAccuracy: {accuracy:.2%}\\nMean RT: {mean_rt:.3f}s\\n\\nPress SPACE to continue."
    color: white
    height: 24
    wrapWidth: 900

  good_bye:
    type: text
    text: "Finished. Correct responses: {total_correct}/{total_trials}\\n\\nPress SPACE to quit."
    color: white
    height: 28
    wrapWidth: 900


# === Triggers ===============================================================
triggers:
  map:
    exp_onset: 1
    exp_end: 2
    block_onset: 10
    block_end: 11
    fixation_onset: 20
    response_prompt_onset: 30
    response_key_press: 31
    response_timeout: 32
    feedback_hit_onset: 40
    feedback_miss_onset: 41
    iti_onset: 50

  driver:
    type: serial_url
    url: loop://
    baudrate: 115200

  timing:
    post_delay_ms: 1

  policy:
    strict: false


# === Generic Controller (optional) =========================================
controller:
  seed: 2026
  shuffle: true
  enable_logging: true


# === Simulation Runtime (sampler responder) =================================
sim:
  output_dir: outputs/sim
  seed: 0
  participant_id: sim001
  session_id: sub-sim001_task-{{cookiecutter.project_name}}_seed0
  log_path: outputs/sim/sub-sim001_task-{{cookiecutter.project_name}}_seed0_sim_events.jsonl
  policy: warn
  default_rt_s: 0.2
  clamp_rt: false
  responder:
    type: responders.task_sampler:TaskSamplerResponder
    kwargs:
      key: space
      hit_rate: 0.7
      rt_mean_s: 0.28
      rt_sd_s: 0.05
      rt_min_s: 0.12
