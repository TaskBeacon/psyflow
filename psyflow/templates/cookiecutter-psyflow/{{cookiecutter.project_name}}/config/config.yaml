# ============================================================================
# Base config (human run)
# - Used by: python main.py
# - Scope: human experiment only (no qa/sim section in this file)
# ============================================================================

# === Subject Form ===========================================================
subinfo_fields:
  - name: subject_id
    type: int
    constraints:
      min: 101
      max: 999
      digits: 3

subinfo_mapping:
  subject_id: Subject ID (3 digits)
  Participant Information: Participant Information
  registration_failed: Registration failed
  registration_successful: Registration successful
  invalid_input: "Invalid input for {field}"


# === Display / Window =======================================================
window:
  size: [1024, 768]
  units: pix
  screen: 0
  bg_color: gray
  fullscreen: false
  monitor_width_cm: 35.5
  monitor_distance_cm: 60


# === Task ==================================================================
task:
  task_name: "{{cookiecutter.project_name}}"
  save_path: ./outputs/human
  total_blocks: 2
  total_trials: 24
  trial_per_block: 12
  conditions: [baseline, variant]
  # Optional weighted condition generation consumed by TaskSettings.resolve_condition_weights().
  # Leave null for even generation.
  # Use either a mapping by condition label or a list aligned to task.conditions.
  condition_weights: null
  key_list: [space]
  correct_key: space
  seed_mode: same_across_sub
  delta: 1


# === Timing =================================================================
timing:
  fixation_duration: 0.5
  response_window_duration: 1.2
  feedback_duration: 0.4
  iti_duration: 0.6


# === Stimuli ================================================================
stimuli:
  fixation:
    type: text
    text: "+"
    color: white
    height: 48

  instruction_text:
    type: text
    text: "Respond with SPACE when the trial prompt appears."
    color: white
    height: 28
    wrapWidth: 900

  trial_prompt:
    type: text
    text: "Condition: {condition_label}\\nPress SPACE."
    color: white
    height: 36
    wrapWidth: 900

  feedback_hit:
    type: text
    text: "Response recorded"
    color: green
    height: 32

  feedback_miss:
    type: text
    text: "No response"
    color: orange
    height: 32

  block_break:
    type: text
    text: "Block {block_num}/{total_blocks}\\nAccuracy: {accuracy:.2%}\\nMean RT: {mean_rt:.3f}s\\n\\nPress SPACE to continue."
    color: white
    height: 24
    wrapWidth: 900

  good_bye:
    type: text
    text: "Finished. Correct responses: {total_correct}/{total_trials}\\n\\nPress SPACE to quit."
    color: white
    height: 28
    wrapWidth: 900


# === Triggers ===============================================================
triggers:
  map:
    exp_onset: 1
    exp_end: 2
    block_onset: 10
    block_end: 11
    fixation_onset: 20
    response_prompt_onset: 30
    response_key_press: 31
    response_timeout: 32
    feedback_hit_onset: 40
    feedback_miss_onset: 41
    iti_onset: 50

  driver:
    type: serial_url
    url: loop://
    baudrate: 115200

  timing:
    post_delay_ms: 1

  policy:
    strict: false


# === Generic Controller (optional) =========================================
controller:
  seed: 2026
  shuffle: true
  enable_logging: true
