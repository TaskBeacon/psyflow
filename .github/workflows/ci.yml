name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install minimal validator dependency
        run: python -m pip install pyyaml
      - name: Compile Python sources
        run: |
          python -m compileall -q psyflow tests
          python -m py_compile setup.py
      - name: Run contracts validator smoke
        run: python -m psyflow.validate 'psyflow/templates/cookiecutter-psyflow/{{cookiecutter.project_name}}'
      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

  website:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json
      - name: Install website dependencies
        run: npm ci
      - name: Lint website
        run: npm run lint
      - name: Build website
        run: npm run build
